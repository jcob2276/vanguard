system:
  bot_name: "Persuasive Communication Mode V1 - Jakub Adapted"
  skill_slug: "persuasive_communication_mode_v1_jakub_adapted"
  daily_target_reps:
    minimum: 4
    target: "6-8"
    rule: "no voice = no progress"
  feedback_format: |
    Worked:
    - [jedna rzecz]
    Improve:
    - [jedna rzecz]
    Next rep:
    - [jedna konkretna instrukcja]
    Status: [pass / partial / repeat_day]
  filler_rules:
    description: "Nie failuj za jeden filler. Redukcja względem baseline."
    correction_rep_triggers:
      - "filler w kluczowym momencie przejęcia ramy"
      - "filler na końcu zdania"
      - "filler przy odpowiedzi na presję"
      - "filler wielokrotnie w tym samym repie"

days:
  - day: 0
    phase: "diagnostic"
    focus: "Diagnostyka bazowa"
    adapter: "sales_setting"
    objective: "Zebranie próbek bazowych bez korygowania i oceniania."
    primary_constraint: "Brak"
    secondary_constraint: null
    background_constraints: []
    rep_a:
      instruction: "Nagraj swoje standardowe otwarcie rozmowy i krótkie przedstawienie siebie."
      duration_seconds: 60
    correction_rep_a:
      trigger: "none"
      instruction_template: "none"
      duration_seconds: 0
    micro_rep_1:
      instruction: "Przećwicz odpowiedź na pytanie: 'Ile to kosztuje?'"
      duration_seconds: 30
    micro_rep_2:
      instruction: "Przećwicz odpowiedź na obiekcję: 'Nie mam teraz czasu.'"
      duration_seconds: 30
    real_life_transfer:
      instruction: "Nagraj real voice note w dowolnej prawdziwej sprawie."
      success_marker: "self_check: Notatka wysłana."
    rep_b:
      instruction: "Nagraj po kolei: krótką historię, spokojną niezgodę oraz jasną intencję społeczną albo randkową."
      duration_seconds: 120
    daily_calibration:
      questions:
        - "Czy wszystkie próbki diagnostyczne zostały zebrane?"
    feedback_rubric:
      transcript_check: "transcript_signal: zliczenie fillerów, tempo i długość pytań."
      self_check: "Brak"
      llm_check: "llm_qualitative_check: mapowanie bad defaults do baseline."
    repeat_day_if:
      - "no voice = no progress"
    common_mistakes: []
    next_rep_instruction_template: "Brak"

  - day: 1
    phase: "controlled speech"
    focus: "Otwarcie wolno"
    adapter: "sales_setting"
    objective: "Zwolnienie tempa w początkowej fazie kontaktu."
    primary_constraint: "Tempo odczuwalnie wolniejsze (compared_to_day_0_baseline)."
    secondary_constraint: null
    background_constraints:
      - "Mniej fillerów niż baseline."
    rep_a:
      instruction: "Przeprowadź otwarcie rozmowy sprzedażowej. Utrzymaj wolne tempo przez 30 sekund."
      duration_seconds: 30
    correction_rep_a:
      trigger: "Szybkie, reaktywne wejście lub filler przed przedstawieniem się."
      instruction_template: "Przerwij, weź oddech. Powtórz wejście bez pośpiechu."
      duration_seconds: 15
    micro_rep_1:
      instruction: "Przećwicz 5 razy swoje imię, nazwisko i firmę, izolując słowa."
      duration_seconds: 20
    micro_rep_2:
      instruction: "Podaj powód kontaktu w jednym, wolnym zdaniu."
      duration_seconds: 20
    real_life_transfer:
      instruction: "Podczas prawdziwej rozmowy powiedz swoje nazwisko zauważalnie wolniej."
      success_marker: "self_check: świadome spowolnienie tempa w pierwszych sekundach."
    rep_b:
      instruction: "Wykonaj pełne otwarcie z symulowanym oporem klienta, nie przyspieszaj przy oporze."
      duration_seconds: 45
    daily_calibration:
      questions:
        - "Czy utrzymałeś tempo pod presją?"
    feedback_rubric:
      transcript_check: "transcript_signal: mniejsza gęstość słów na sekundę."
      self_check: "Czy tempo czułeś jako nienaturalne?"
      llm_check: "llm_qualitative_check: ocena wrażenia spokoju."
    repeat_day_if:
      - "no voice = no progress"
      - "Tempo równe lub wyższe niż baseline."
    common_mistakes:
      - "Robotyczne przeciąganie słów zamiast używania pauzy."
    next_rep_instruction_template: "W kolejnym repie skup się na pauzie bezpośrednio po nazwisku."

  - day: 2
    phase: "controlled speech"
    focus: "Korek / artykulacja"
    adapter: "leadership_work"
    objective: "Wyraźna dykcja i twarda wymowa spółgłosek przy delegowaniu zadania."
    primary_constraint: "Brak zjadania końcówek (llm_qualitative_check)."
    secondary_constraint: null
    background_constraints:
      - "Tempo wolniejsze niż baseline."
    rep_a:
      instruction: "Wygłoś 30-sekundowy update do zespołu, mocno akcentując każde słowo."
      duration_seconds: 30
    correction_rep_a:
      trigger: "Niewyraźne, zlane w jedno słowa na końcu zdania."
      instruction_template: "Zatrzymaj się. Wyraźnie wyartykułuj ostatnie zdanie jeszcze raz."
      duration_seconds: 15
    micro_rep_1:
      instruction: "Przeczytaj krótki akapit technicznego tekstu przesadnie wolno i wyraźnie."
      duration_seconds: 20
    micro_rep_2:
      instruction: "Wypowiedz 3 najczęstsze komendy firmowe, otwierając szeroko usta."
      duration_seconds: 15
    real_life_transfer:
      instruction: "Wygłoś jedną pełną odpowiedź na spotkaniu skupiając się tylko na artykulacji."
      success_marker: "self_check: Poczucie pełnego wybrzmienia każdego słowa."
    rep_b:
      instruction: "Przekaż trudny feedback pracownikowi, zachowując perfekcyjną dykcję pomimo stresu."
      duration_seconds: 45
    daily_calibration:
      questions:
        - "Czy czułeś opór mięśni twarzy przy przesadnej artykulacji?"
    feedback_rubric:
      transcript_check: "transcript_signal: poprawne transkrybowanie trudnych słów przez silnik ASR."
      self_check: "Czy mówiłeś z pełnym kontaktem z aparatem mowy?"
      llm_check: "llm_qualitative_check: stanowczość i jasność przekazu."
    repeat_day_if:
      - "no voice = no progress"
    common_mistakes:
      - "Wracanie do mamrotania przy trudniejszych argumentach."
    next_rep_instruction_template: "Przed kolejnym zdaniem otwórz szerzej usta przy samogłoskach."

  - day: 3
    phase: "controlled speech"
    focus: "Statement fall drill"
    adapter: "leadership_work"
    objective: "Twarde domykanie zdań oznajmujących (intonacja w dół)."
    primary_constraint: "Brak uptalk na końcu twierdzeń (llm_qualitative_check)."
    secondary_constraint: null
    background_constraints:
      - "Artykulacja poprawiona względem baseline."
    rep_a:
      instruction: "Przekaż 3 decyzje projektowe. Każde zdanie zakończ twardą kropką."
      duration_seconds: 30
    correction_rep_a:
      trigger: "Rosnąca intonacja na końcu zdania (pytanie zamiast kropki)."
      instruction_template: "Zabrzmiało jak pytanie. Powtórz z twardym opadem głosu na końcu."
      duration_seconds: 15
    micro_rep_1:
      instruction: "Wypowiedz 5 razy 'Widzimy się jutro o dziesiątej', akcentując dół na 'dziesiątej'."
      duration_seconds: 15
    micro_rep_2:
      instruction: "Wypowiedz 3 twarde fakty o swoim produkcie."
      duration_seconds: 20
    real_life_transfer:
      instruction: "Zakończ dzisiejsze spotkanie jednym, stanowczym zdaniem opadającym."
      success_marker: "self_check: Uczucie 'zablokowania' dyskusji swoim tonem."
    rep_b:
      instruction: "Przedstaw trudną decyzję dla zespołu. Każde zdanie musi być opadające."
      duration_seconds: 45
    daily_calibration:
      questions:
        - "Czy domknięcie było odczuwalnie twarde?"
    feedback_rubric:
      transcript_check: "Brak."
      self_check: "Pewność siebie przy stawianiu kropki."
      llm_check: "llm_qualitative_check: detekcja asertywnego zamknięcia (brak asekuracji)."
    repeat_day_if:
      - "no voice = no progress"
    common_mistakes:
      - "Uciekanie głosem do góry, by złagodzić brzmienie decyzji."
    next_rep_instruction_template: "Zrób wydech na ostatniej sylabie, by fizycznie obniżyć ton."

  - day: 4
    phase: "controlled speech"
    focus: "Pause instead of filler drill"
    adapter: "social_dating"
    objective: "Eradykacja nawyku wypełniania ciszy dźwiękami i słowami-wytrychami."
    primary_constraint: "Zastosowanie ciszy zamiast fillera (transcript_signal)."
    secondary_constraint: null
    background_constraints:
      - "Redukcja 'jakby', 'tutaj', 'no' compared_to_day_0_baseline."
    rep_a:
      instruction: "Zacznij opowiadać o swoich planach na weekend. Zamiast fillera, zamknij usta na 2 sekundy."
      duration_seconds: 45
    correction_rep_a:
      trigger: "Filler w kluczowym momencie ramy lub na końcu zdania."
      instruction_template: "Użyłeś fillera. Weź oddech, przytrzymaj ciszę i powtórz od nowa."
      duration_seconds: 15
    micro_rep_1:
      instruction: "Odpowiedz na pytanie o ulubiony film. Zrób wymuszoną 3-sekundową pauzę w środku myśli."
      duration_seconds: 20
    micro_rep_2:
      instruction: "Powiedz 3 zdania, po każdym zamykając fizycznie usta na sekundę."
      duration_seconds: 15
    real_life_transfer:
      instruction: "W luźnej rozmowie zawieś głos na 2 sekundy w połowie zdania zamiast mówić 'yyy'."
      success_marker: "self_check: Kontrola nad odruchem wydania dźwięku podczas myślenia."
    rep_b:
      instruction: "Odpowiedz na trudne, zaskakujące pytanie o plany. Używaj wyłącznie czystych pauz."
      duration_seconds: 60
    daily_calibration:
      questions:
        - "Czy pauza była komfortowa?"
    feedback_rubric:
      transcript_check: "transcript_signal: detekcja przerw bez dźwięków zakłócających."
      self_check: "Zauważenie fizycznego odruchu ucieczki w filler."
      llm_check: "llm_qualitative_check: płynność opowieści mimo wstrzymania."
    repeat_day_if:
      - "no voice = no progress"
    common_mistakes:
      - "Wypuszczanie powietrza z dźwiękiem 'ech' podczas pauzy."
    next_rep_instruction_template: "Fizycznie zaciśnij usta w momencie gdy brakuje Ci słowa."

  - day: 5
    phase: "controlled speech"
    focus: "Short sentence drill"
    adapter: "sales_setting"
    objective: "Wyeliminowanie overexplainingu przez ograniczenie długości zdania."
    primary_constraint: "Maksymalnie 8 słów na zdanie."
    secondary_constraint: null
    background_constraints:
      - "Brak spójników łączących 'i, a, więc' do budowania tasiemców."
    rep_a:
      instruction: "Wyjaśnij główną zaletę swojego produktu używając wyłącznie zdań do 8 słów."
      duration_seconds: 30
    correction_rep_a:
      trigger: "Zdanie przekracza 8 słów lub użyto spójnika łączącego."
      instruction_template: "Zbyt długo. Podziel to na dwa osobne zdania."
      duration_seconds: 15
    micro_rep_1:
      instruction: "Zdefiniuj swój biznes w 3 zdaniach. Każde max 5 słów."
      duration_seconds: 15
    micro_rep_2:
      instruction: "Odpowiedz na 'dlaczego mam to kupić?' dwoma zdaniami (max 8 słów)."
      duration_seconds: 15
    real_life_transfer:
      instruction: "Odpowiedz klientowi na mailu lub żywo używając max dwóch krótkich zdań."
      success_marker: "self_check: Klient zrozumiał bez potoku słów."
    rep_b:
      instruction: "Klient prosi o szczegóły techniczne. Odpowiedz 4 krótkimi uderzeniami."
      duration_seconds: 40
    daily_calibration:
      questions:
        - "Czy powstrzymałeś chęć dopowiedzenia reszty kontekstu?"
    feedback_rubric:
      transcript_check: "transcript_signal: analiza długości zdań i zliczanie słów do kropki."
      self_check: "Uczucie redukcji wysiłku."
      llm_check: "llm_qualitative_check: czy przekaz zachował sens przy skróconej formie."
    repeat_day_if:
      - "no voice = no progress"
    common_mistakes:
      - "Tworzenie dziwnych konstrukcji gramatycznych, by zmieścić się w 8 słowach."
    next_rep_instruction_template: "Zamiast upychać sens w jednym zdaniu, oddziel fakty twardą kropką."

  - day: 6
    phase: "frame control"
    focus: "Opening call"
    adapter: "sales_setting"
    objective: "Ustanowienie ramy na starcie przez Upfront Contract."
    primary_constraint: "Podanie agendy bez tłumaczenia się z powodu telefonu (llm_qualitative_check)."
    secondary_constraint: null
    background_constraints:
      - "Tempo wolniejsze niż baseline."
    rep_a:
      instruction: "Zainicjuj call z zimnym leadem. Podaj cel, ramy czasowe i zapytaj 'Zgadza się?'"
      duration_seconds: 30
    correction_rep_a:
      trigger: "Dodanie asekuracji np. 'dzwonię tylko na sekundkę' lub 'przepraszam że przeszkadzam'."
      instruction_template: "Złamałeś ramę. Zacznij twardo: 'Cel to X, zajmie Y, Zgadza się?'"
      duration_seconds: 15
    micro_rep_1:
      instruction: "Wygłoś 15-sekundowy kontrakt dla spotkania Zoom."
      duration_seconds: 15
    micro_rep_2:
      instruction: "Zadaj końcowe pytanie kontrolne ramy: 'Brzmi to dla ciebie fair?'"
      duration_seconds: 10
    real_life_transfer:
      instruction: "Przy następnej rozmowie podaj agendę i zapytaj o zgodę zanim zaczniesz mówić o sobie."
      success_marker: "self_check: Rozmówca werbalnie potwierdził agendę."
    rep_b:
      instruction: "Klient od razu na start mówi 'mam mało czasu'. Zainstaluj kontrakt z limitem."
      duration_seconds: 45
    daily_calibration:
      questions:
        - "Czy przejąłeś kontrolę w pierwszych 30 sekundach?"
    feedback_rubric:
      transcript_check: "Brak asekuracyjnych słów kluczowych w pierwszych zdaniach."
      self_check: "Pewność siebie podczas podawania agendy."
      llm_check: "llm_qualitative_check: obecność elementu kontraktu."
    repeat_day_if:
      - "no voice = no progress"
    common_mistakes:
      - "Zbyt miękkie pytanie o zgodę na agendę."
    next_rep_instruction_template: "Podaj agendę tonem faktu, a potem zrób pełną pauzę."

  - day: 7
    phase: "frame control"
    focus: "Ile to kosztuje?"
    adapter: "sales_setting"
    objective: "Utrzymanie struktury przez niepodawanie ceny przed kwalifikacją."
    primary_constraint: "Brak podania ostatecznej ceny przed kwalifikacją (llm_qualitative_check)."
    secondary_constraint: "Validation & Redirect przy każdym pytaniu o cenę."
    background_constraints:
      - "Intonacja w dół przy redirect."
    rep_a:
      instruction: "Klient przerywa i pyta: 'To ile to kosztuje?'. Zawróć go do swojej agendy."
      duration_seconds: 30
    correction_rep_a:
      trigger: "Podanie widełek cenowych przed kwalifikacją lub paniczne tłumaczenie."
      instruction_template: "Utraciłeś ramę. Sytuację ratuje: 'Zaraz do tego dojdziemy, najpierw...'"
      duration_seconds: 15
    micro_rep_1:
      instruction: "Przećwicz zwrot: 'Cena zależy od wielu opcji, najpierw muszę ustalić czy to dla was'."
      duration_seconds: 15
    micro_rep_2:
      instruction: "Przećwicz zwrot: 'Rozumiem, że budżet jest kluczowy. Zanim podam liczby...'"
      duration_seconds: 15
    real_life_transfer:
      instruction: "Kiedy ktoś za wcześnie zapyta o wynik/koszt w pracy, zaparkuj pytanie do późniejszej fazy."
      success_marker: "self_check: Skuteczne odroczenie odpowiedzi bez wywołania złości."
    rep_b:
      instruction: "Klient agresywnie napiera: 'Nie będę gadał bez podania ceny'. Zarządzaj ramą."
      duration_seconds: 50
    daily_calibration:
      questions:
        - "Czy powstrzymałeś odruch zadowolenia klienta za wszelką cenę?"
    feedback_rubric:
      transcript_check: "Brak liczb i walut w wypowiedzi."
      self_check: "Spokój w obliczu presji klienta."
      llm_check: "llm_qualitative_check: płynność powrotu do pytań diagnostycznych."
    repeat_day_if:
      - "no voice = no progress"
    common_mistakes:
      - "Agresywne lub aroganckie odbicie piłeczki ('nie pana sprawa')."
    next_rep_instruction_template: "Zwaliduj jego potrzebę znajomości ceny, zanim zrobisz redirect."

  - day: 8
    phase: "frame control"
    focus: "Nie mam czasu"
    adapter: "sales_setting"
    objective: "Reakcja na presję czasową przez puszczenie liny."
    primary_constraint: "Brak przekonywania i wymuszania przy odmowie (llm_qualitative_check)."
    secondary_constraint: "Oddanie kontroli pytaniem zamiast argumentem."
    background_constraints:
      - "Pauza zamiast świadomego fillera przy oporze."
    rep_a:
      instruction: "Klient mówi 'Nie mam teraz czasu'. Zastosuj puszczenie liny np. 'Czy to zły moment?'"
      duration_seconds: 25
    correction_rep_a:
      trigger: "Użycie przekonywania np. 'To zajmie tylko minutę'."
      instruction_template: "Błąd. Nie walcz. Powiedz: 'Wygląda na to, że nie masz teraz przestrzeni.'"
      duration_seconds: 15
    micro_rep_1:
      instruction: "Wypowiedz na głos: 'Rozumiem, to nie jest dobry czas na rozmowę. Zostawmy to.'"
      duration_seconds: 10
    micro_rep_2:
      instruction: "Zadaj pytanie puszczające: 'Czyli co robimy, kończymy na dziś?'"
      duration_seconds: 10
    real_life_transfer:
      instruction: "Oddaj kontrolę rozmówcy, gdy zgłasza brak czasu na rozmowę w domu/pracy."
      success_marker: "self_check: Rozmówca sam zasugerował nowy termin po puszczeniu liny."
    rep_b:
      instruction: "Rozmówca próbuje Cię spławić mówiąc 'wyślij maila, nie mam czasu'. Oddaj linę."
      duration_seconds: 40
    daily_calibration:
      questions:
        - "Czy czułeś uwolnienie od presji poprzez oddanie kontroli?"
    feedback_rubric:
      transcript_check: "transcript_signal: detekcja pytań zdejmujących presję."
      self_check: "Kontrola tętna/emocji przy odmowie."
      llm_check: "llm_qualitative_check: brak namawiania do zostania na linii."
    repeat_day_if:
      - "no voice = no progress"
    common_mistakes:
      - "Tłumaczenie, dlaczego jednak warto poświęcić czas."
    next_rep_instruction_template: "Powiedz 'Ok, rozumiem' i zawieś całkowicie głos."

  - day: 9
    phase: "frame control"
    focus: "Klient się rozgaduje"
    adapter: "sales_setting"
    objective: "Przerwanie wodospadu słów bez bycia agresywnym, lecz stanowczym."
    primary_constraint: "Zastosowanie zwrotu stopującego (np. 'Zatrzymajmy się') (llm_qualitative_check)."
    secondary_constraint: null
    background_constraints:
      - "Statement fall przy przerwaniu."
    rep_a:
      instruction: "Klient opowiada historię nie na temat. Przerwij mu, wracając do agendy."
      duration_seconds: 30
    correction_rep_a:
      trigger: "Zbyt długie czekanie lub przepraszanie za przerwanie."
      instruction_template: "Wejdź z twardym 'Zatrzymajmy się tu na sekundę'."
      duration_seconds: 15
    micro_rep_1:
      instruction: "Przećwicz twardo: 'Jakub, zatrzymajmy się w tym miejscu.'"
      duration_seconds: 10
    micro_rep_2:
      instruction: "Przećwicz przekierowanie: 'To ciekawe, ale żeby szanować Twój czas, wróćmy do...'"
      duration_seconds: 15
    real_life_transfer:
      instruction: "Przerwij komuś monolog w prawdziwym życiu używając stanowczego 'zatrzymajmy się'."
      success_marker: "self_check: Monolog przerwany bez wywołania konfliktu."
    rep_b:
      instruction: "AI symuluje długi ciąg słów. Przerwij asertywnie w trakcie jego zdania."
      duration_seconds: 45
    daily_calibration:
      questions:
        - "Czy czułeś autorytet przy przerywaniu?"
    feedback_rubric:
      transcript_check: "Brak słowa przepraszam w transkrypcie."
      self_check: "Stanowczość w działaniu."
      llm_check: "llm_qualitative_check: elegancja powrotu do wątku głównego."
    repeat_day_if:
      - "no voice = no progress"
    common_mistakes:
      - "Biernie czekanie aż klient sam skończy."
    next_rep_instruction_template: "Użyj imienia rozmówcy na początku przerwania, to ściąga uwagę."

  - day: 10
    phase: "frame control"
    focus: "Odrzucenie no-fita"
    adapter: "sales_setting"
    objective: "Twarde zakończenie rozmowy, gdy nie ma fitu biznesowego."
    primary_constraint: "Zakończenie w max 2 zdaniach bez overexplaining (transcript_signal)."
    secondary_constraint: null
    background_constraints:
      - "Maksymalnie 8 słów w zdaniu."
    rep_a:
      instruction: "Odpowiedz potencjalnemu klientowi, że jego budżet lub potrzeby do Ciebie nie pasują."
      duration_seconds: 25
    correction_rep_a:
      trigger: "Rozpisywanie się na temat dlaczego to nie działa lub doradzanie."
      instruction_template: "Za dużo tekstu. Skróć do 'To nie jest dla nas. Dziękuję'."
      duration_seconds: 15
    micro_rep_1:
      instruction: "Powiedz: 'Z tego co słyszę, nie jesteśmy dobrym dopasowaniem.'"
      duration_seconds: 10
    micro_rep_2:
      instruction: "Powiedz: 'Nie pomogę Ci w tym. Powodzenia w poszukiwaniach.'"
