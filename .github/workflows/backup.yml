name: Nightly Backup

on:
  schedule:
    # Run every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Backup Script
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_OUTPUT_DIR: './vanguard-backup'
        run: node scripts/ops/backup-vanguard.mjs

      - name: Compress Backup Directory
        run: tar -czf vanguard-backup.tar.gz -C ./vanguard-backup .

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanguard-backup-${{ github.run_id }}
          path: vanguard-backup.tar.gz
          retention-days: 30
