name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Registry audit
        run: npm run audit:registry

      - name: Migration drift check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npm run db:check-drift

      - name: Typecheck edge functions
        run: npm run typecheck

      - name: Typecheck UI
        run: npm run typecheck:ui

      - name: Lint
        run: npm run lint

      - name: Frontend debt ratchets
        run: npm run ratchet:frontend

      - name: Dead code check (Knip)
        run: npm run audit:knip

      - name: Test
        run: npm run test

      - name: Test edge function logic (Deno)
        run: npm run test:edge

      - name: UI smoke
        run: npm run smoke:ui
