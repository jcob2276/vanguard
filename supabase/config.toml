[functions.vanguard-metabolism]
verify_jwt = false


[functions.vanguard-executor]
enabled = true
verify_jwt = false
import_map = "./functions/vanguard-executor/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/vanguard-executor/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
