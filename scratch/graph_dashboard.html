<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard OS | Graph Mind</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        #mynetwork {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
        .filters {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ccc;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.1); }
        .filter-btn.active {
            border-color: #00f2ff;
            color: #00f2ff;
            background: rgba(0, 242, 255, 0.05);
        }
        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #00f2ff;
            text-transform: uppercase;
        }
        .stats {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Vanguard Graph Mind</h1>
        <div class="stats" id="stats">Inicjalizacja neuronów...</div>
    </div>
    
    <div class="filters">
        <button class="filter-btn active" onclick="toggleFilter('all', this)">Wszystko</button>
        <button class="filter-btn" onclick="toggleFilter('person', this)">Ludzie</button>
        <button class="filter-btn" onclick="toggleFilter('career', this)">Kariera/Studia</button>
        <button class="filter-btn" onclick="toggleFilter('event', this)">Wydarzenia</button>
        <button class="filter-btn" onclick="toggleFilter('state', this)">Stany/Psychologia</button>
    </div>

    <div id="mynetwork"></div>

    <script>
        const SUPABASE_URL = "https://pdvqkgfsqziqlhptatgf.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkdnFrZ2ZzcXppcWxocHRhdGdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODQ0NzgsImV4cCI6MjA5Mjk2MDQ3OH0.vM69FS8w1K3N_eJjD7LLYxi59T2xCnMH1STEsAICyqU";
        const USER_ID = "165ae341-670c-46ce-82dc-434c4dbfcdfd";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let network = null;
        let allData = { nodes: [], edges: [] };
        let currentFilter = 'all';

        function toggleFilter(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = category;
            applyFilter();
        }

        function applyFilter() {
            let filteredNodes = allData.nodes;
            if (currentFilter !== 'all') {
                filteredNodes = allData.nodes.filter(n => n.category === currentFilter);
                // Dodaj węzły połączone z przefiltrowanymi węzłami, żeby graf nie był pusty
                const nodeIds = new Set(filteredNodes.map(n => n.id));
                const connectedEdges = allData.edges.filter(e => nodeIds.has(e.from) || nodeIds.has(e.to));
                const connectedNodeIds = new Set([...connectedEdges.map(e => e.from), ...connectedEdges.map(e => e.to)]);
                filteredNodes = allData.nodes.filter(n => connectedNodeIds.has(n.id));
            }

            const nodeIds = new Set(filteredNodes.map(n => n.id));
            const filteredEdges = allData.edges.filter(e => nodeIds.has(e.from) && nodeIds.has(e.to));

            network.setData({
                nodes: new vis.DataSet(filteredNodes),
                edges: new vis.DataSet(filteredEdges)
            });
        }

        async function initGraph() {
            const { data, error } = await supabaseClient
                .from('vanguard_entity_links')
                .select('*')
                .eq('user_id', USER_ID);

            if (error) {
                document.getElementById('stats').innerText = "Błąd połączenia: " + error.message;
                return;
            }

            document.getElementById('stats').innerText = `Aktywne połączenia: ${data.length}`;

            const nodesMap = new Map();
            const edges = [];

            data.forEach(link => {
                const addNode = (id, type) => {
                    if (!nodesMap.has(id)) {
                        let color = '#00f2ff';
                        let category = 'other';
                        if (type === 'person') { color = '#ff0055'; category = 'person'; }
                        if (type === 'career' || id.includes('studia') || id.includes('mgr')) { color = '#ffcc00'; category = 'career'; }
                        if (type === 'state' || type === 'physical_state') { color = '#7700ff'; category = 'state'; }
                        if (type === 'event') { color = '#00ff66'; category = 'event'; }
                        
                        nodesMap.set(id, { id, label: id, color, category });
                    }
                };

                addNode(link.source_entity, link.source_type);
                addNode(link.target_entity, link.target_type);

                edges.push({
                    from: link.source_entity,
                    to: link.target_entity,
                    label: link.relation,
                    arrows: 'to',
                    color: { color: 'rgba(255,255,255,0.1)', highlight: '#00f2ff' },
                    font: { size: 9, color: '#444', strokeWidth: 0 }
                });
            });

            allData = { nodes: Array.from(nodesMap.values()), edges };

            const container = document.getElementById('mynetwork');
            network = new vis.Network(container, {
                nodes: new vis.DataSet(allData.nodes),
                edges: new vis.DataSet(allData.edges)
            }, {
                nodes: { shape: 'dot', size: 14, font: { color: '#ccc', size: 12 } },
                physics: {
                    forceAtlas2Based: { gravitationalConstant: -30, centralGravity: 0.005, springLength: 150 },
                    solver: 'forceAtlas2Based',
                    timestep: 0.35,
                    stabilization: { iterations: 100 }
                }
            });
        }

        initGraph();
    </script>
</body>
</html>
